<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backlog</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar" aria-label="Primary">
      <div class="sidebar-logo">
        <svg class="sidebar-logo-mark" width="22" height="22" viewBox="0 0 22 22" aria-hidden="true" focusable="false">
          <rect x="3" y="4"    width="16" height="3" rx="1.5"/>
          <rect x="3" y="9.5"  width="11" height="3" rx="1.5" opacity="0.65"/>
          <rect x="3" y="15"   width="6"  height="3" rx="1.5" opacity="0.4"/>
        </svg>
        <span class="sidebar-logo-wordmark">Backlog</span>
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Collapse sidebar" aria-expanded="true" title="Hide sidebar">«</button>
      </div>

      <div class="sidebar-projselect-wrap">
        <select id="project-select" class="filter-select" style="width:100%" aria-label="Project">
          <option value="">All projects</option>
        </select>
      </div>

      <div class="sidebar-section">Workspace</div>
      <div class="sidebar-item active" data-page="tasks"><span class="icon">▦</span>Tasks</div>
      <div class="sidebar-item" data-page="docs"><span class="icon">≡</span>Docs</div>
      <div class="sidebar-item" data-page="plans"><span class="icon">∷</span>Plans</div>
      <div class="sidebar-item" data-page="memory"><span class="icon">◇</span>Memory</div>
      <div class="sidebar-item" data-page="attachments"><span class="icon">⌘</span>Attachments</div>

      <div class="sidebar-section">More</div>
      <div class="sidebar-item" data-page="projects"><span class="icon">⊟</span>Projects</div>
      <div class="sidebar-item" data-page="activity"><span class="icon">∼</span>Activity</div>
    </nav>
    <button class="sidebar-expand" id="sidebar-expand" aria-label="Show sidebar" title="Show sidebar">☰</button>
    <main class="main" id="app">
      <div class="empty"><div class="empty-text">Loading…</div></div>
    </main>
  </div>
  <div id="cmd-bar" class="cmd-bar"></div>
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
