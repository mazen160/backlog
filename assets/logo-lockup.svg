<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" width="420" height="80" fill="none">
  <!-- Backlog full logo lockup
       Mark + wordmark, vertically centered, ~16px gap.
       Mark scaled to match the wordmark x-height. -->

  <!-- Mark (scaled and positioned vertically centered to the wordmark) -->
  <g transform="translate(0, 8)">
    <!-- Active row -->
    <circle cx="10" cy="14" r="4" fill="#B87333"/>
    <rect x="18" y="10" width="38" height="8" rx="3" fill="#B87333"/>
    <!-- Queued row -->
    <circle cx="10" cy="32" r="4" fill="#B87333" fill-opacity="0.55"/>
    <rect x="18" y="28" width="28" height="8" rx="3" fill="#B87333" fill-opacity="0.55"/>
    <!-- Archived row -->
    <circle cx="10" cy="50" r="4" fill="none" stroke="#B87333" stroke-width="2" stroke-opacity="0.55"/>
    <rect x="18" y="46" width="18" height="8" rx="3" fill="none" stroke="#B87333" stroke-width="2" stroke-opacity="0.55"/>
  </g>

  <!-- Wordmark -->
  <text x="80" y="58"
        font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="64"
        font-weight="700"
        letter-spacing="-2.5"
        fill="#2F2B25">backlog</text>
</svg>
