<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" width="420" height="80" fill="none">
  <!-- Backlog full logo lockup  dark-mode variant
       Mark uses the brighter copper (#D49A5C) for contrast on dark surfaces.
       Wordmark inverts to warm cream (#ECEBE7). -->

  <g transform="translate(0, 8)">
    <circle cx="10" cy="14" r="4" fill="#D49A5C"/>
    <rect x="18" y="10" width="38" height="8" rx="3" fill="#D49A5C"/>
    <circle cx="10" cy="32" r="4" fill="#D49A5C" fill-opacity="0.55"/>
    <rect x="18" y="28" width="28" height="8" rx="3" fill="#D49A5C" fill-opacity="0.55"/>
    <circle cx="10" cy="50" r="4" fill="none" stroke="#D49A5C" stroke-width="2" stroke-opacity="0.55"/>
    <rect x="18" y="46" width="18" height="8" rx="3" fill="none" stroke="#D49A5C" stroke-width="2" stroke-opacity="0.55"/>
  </g>

  <text x="80" y="58"
        font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="64"
        font-weight="700"
        letter-spacing="-2.5"
        fill="#ECEBE7">backlog</text>
</svg>
